name: KWR Sentinel Release Ops

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag containing the certified Sentinel ZIP.
        required: true
        default: v6.1.0-alpha.25
      sentinel_sha256:
        description: Expected SHA-256 for the certified Sentinel ZIP.
        required: true
        default: A632BA7E24D2639C38B7412D126B29899F24C3640583DF2E5D64EE547DEE82C4
      artifact_name:
        description: Exact certified Sentinel ZIP filename from the GitHub release.
        required: true
        default: KWRSentinel_6_1_0_ALPHA_25.zip
      hash_manifest_name:
        description: Exact SHA-256 manifest filename from the GitHub release.
        required: true
        default: KWR_6_1_0_ALPHA_25_SHA256.txt
      upload_curseforge:
        description: Upload the certified ZIP to CurseForge.
        required: true
        type: boolean
        default: false
      post_discord:
        description: Post prepared Discord updates through configured webhooks.
        required: true
        type: boolean
        default: false
      confirm_external_writes:
        description: Type PUBLISH to permit a CurseForge upload or Discord post.
        required: false
        default: ""

concurrency:
  group: sentinel-release-ops
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-ops:
    runs-on: windows-latest
    timeout-minutes: 15
    environment: sentinel-release-ops
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      SENTINEL_SHA256: ${{ inputs.sentinel_sha256 }}
      ARTIFACT_NAME: ${{ inputs.artifact_name }}
      HASH_MANIFEST_NAME: ${{ inputs.hash_manifest_name }}
      CONFIRM_EXTERNAL_WRITES: ${{ inputs.confirm_external_writes }}
    steps:
      - name: Checkout Sentinel repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate release inputs and external-write intent
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v[0-9A-Za-z][0-9A-Za-z._-]*$') {
              throw "Release tag contains unsupported characters."
          }
          foreach ($name in @($env:ARTIFACT_NAME, $env:HASH_MANIFEST_NAME)) {
              if ([IO.Path]::GetFileName($name) -ne $name -or $name -notmatch '^[0-9A-Za-z][0-9A-Za-z._-]*$') {
                  throw "Artifact inputs must be plain filenames with no directory components."
              }
          }
          if ($env:SENTINEL_SHA256 -notmatch '^[A-Fa-f0-9]{64}$') {
              throw "Expected Sentinel SHA-256 must contain exactly 64 hexadecimal characters."
          }
          $externalWriteRequested = "${{ inputs.upload_curseforge || inputs.post_discord }}" -eq "true"
          if ($externalWriteRequested -and $env:CONFIRM_EXTERNAL_WRITES -cne "PUBLISH") {
              throw "External release writes require confirm_external_writes=PUBLISH."
          }

      - name: Download certified release artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          gh release download $env:RELEASE_TAG `
            --repo "${{ github.repository }}" `
            --pattern $env:ARTIFACT_NAME `
            --pattern $env:HASH_MANIFEST_NAME `
            --dir artifacts

      - name: Verify Sentinel artifact hash
        shell: pwsh
        run: |
          $artifact = Join-Path "${{ github.workspace }}" ("artifacts\" + $env:ARTIFACT_NAME)
          if (-not (Test-Path -LiteralPath $artifact)) {
              throw "Missing Sentinel release artifact: $artifact"
          }
          $actual = (Get-FileHash -LiteralPath $artifact -Algorithm SHA256).Hash.ToUpperInvariant()
          $expected = $env:SENTINEL_SHA256.ToUpperInvariant()
          if ($actual -ne $expected) {
              throw "Sentinel hash mismatch. Expected $expected but got $actual."
          }
          Write-Output "Verified Sentinel artifact: $actual"

      - name: Dry-run release operations
        shell: pwsh
        run: |
          ./tools/curseforge-upload-sentinel.ps1 `
            -ArtifactPath (Join-Path "${{ github.workspace }}" ("artifacts\" + $env:ARTIFACT_NAME)) `
            -DryRun
          foreach ($section in @("announcements", "support", "field-testing", "ops")) {
              ./tools/sentinel-discord-announce.ps1 -Section $section -DryRun
          }

      - name: Upload Sentinel to CurseForge
        if: ${{ inputs.upload_curseforge }}
        shell: pwsh
        env:
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_GAME_VERSION_IDS: ${{ secrets.CURSEFORGE_GAME_VERSION_IDS }}
        run: |
          ./tools/curseforge-upload-sentinel.ps1 `
            -ArtifactPath (Join-Path "${{ github.workspace }}" ("artifacts\" + $env:ARTIFACT_NAME))

      - name: Post Discord announcement
        if: ${{ inputs.post_discord }}
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ANNOUNCEMENTS }}
        run: ./tools/sentinel-discord-announce.ps1 -Section announcements

      - name: Post Discord support notes
        if: ${{ inputs.post_discord }}
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_SUPPORT }}
        run: ./tools/sentinel-discord-announce.ps1 -Section support

      - name: Post Discord field-test notes
        if: ${{ inputs.post_discord }}
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_FIELD_TESTING }}
        run: ./tools/sentinel-discord-announce.ps1 -Section field-testing

      - name: Post Discord ops receipt
        if: ${{ inputs.post_discord }}
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_OPS }}
        run: ./tools/sentinel-discord-announce.ps1 -Section ops
